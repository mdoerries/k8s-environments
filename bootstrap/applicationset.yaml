apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: envs
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  generators:
    - git:
        repoURL: https://github.com/mdoerries/k8s-environments.git
        revision: main
        files:
          - path: 'environments/*/env.yaml'
      # Post-Selector: filtert die generierten Parameter, BEVOR daraus Applications werden.
      # Der Controller stringifiziert alle Werte vorher (fmt.Sprintf("%v", v)), das YAML-Boolean
      # `true` wird also zum String "true" — Anfuehrungszeichen in der env.yaml sind unnoetig.
      #
      # Bewusst eine Whitelist (In), keine Blacklist (NotIn): `enabled` ist damit Pflichtfeld.
      # Ein Tippfehler laesst die Umgebung VERSCHWINDEN statt still weiterlaufen — bei einem
      # Schalter zum Abschalten ist "bleibt versehentlich an" die gefaehrlichere Fehlerrichtung.
      selector:
        matchExpressions:
          - key: enabled
            operator: In
            values: ['true']
  template:
    metadata:
      name: '{{ .name }}'
      labels:
        gitops/env: '{{ .name }}'
      annotations:
        gitops/creator: '{{ .creator }}'
        gitops/purpose: '{{ .purpose }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io/foreground
    spec:
      project: bootstrap
      sources:
        - repoURL: https://github.com/mdoerries/k8s-environments.git
          targetRevision: main
          path: bootstrap/app-of-apps
          helm:
            valueFiles:
              - $values/environments/{{ .name }}/env.yaml
        - repoURL: https://github.com/mdoerries/k8s-environments.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  syncPolicy:
    preserveResourcesOnDeletion: false
